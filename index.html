<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="O melhor tênis que você poder adquirir, pense bem e compre um Nike!">
    <link rel="stylesheet" href="estilo.css">
    <title>Tênis Nike Shox NZ</title>
</head>
<body>
    <header class="nav-bar">
        <img src="logo-nike.png" alt="Logo Nike" class="nav-bar-img">
        <nav class="nav-bar-menu">
            <a class="nav-bar-links">Sobre o Tênis</a>
            <a class="nav-bar-links">Sobre a Nike</a>
            <a class="nav-bar-links">Quem usa ?</a>
        </nav>
    </header>

    <main>
        <section class="conteudo">
            <div class="compra">
                <h1 id="titulo-de-compra">Tênis Nike Shox NZ</h1>
                <p id="valor"><strong>R$ 8000.00</strong></p>
                <button id="botao-de-compra">Comprar</button>
            </div>
            <img src="tenis.png" alt="Tênis Nike Shox NZ" id="tenis">
        </section>
        <section class="detalhes">
            <h2 class="detalhes-texto">Se eu comprar ?</h2>
            <p class="detalhes-texto">Super conforto e <strong>estilo</strong> sem igual</p>
            <p class="detalhes-texto">É o que há de mais novo no conceito de<strong> tênis Nike para casualidades</strong></p>
            <p class="detalhes-texto">Só os <strong>maiorais usam tênis Nike</strong>, ainda mais quando falamos do Shox NZ</p>
        </section>
    </main>

    <footer>
        <img src="Logo_NIKE.svg.png" alt="Logo Nike fim de página" id="img-fim-da-pagina">
    </footer>
</body>
</html>
